[platformio]
default_envs = 
                 ; custom_autoRearLight_d1Mini_full
                 custom_autoRearLight_d1Mini
                 ; stock_d1Mini
                 custom_autoRearLight_esp32_full
                 custom_autoRearLight_esp32

; ============================================================
; ENV 1: D1 Mini — WLED STOCK, TANPA USERMOD
; Untuk memastikan WLED berjalan normal di hardware ini
; sebelum usermod ditambahkan.
; ============================================================
[env:stock_d1Mini]
extends = env:nodemcuv2
board = d1_mini
board_build.ldscript = ${common.ldscript_4m1m}
build_flags =
  ${common.build_flags}
  ${esp8266.build_flags}
  -D WLED_RELEASE_NAME=\"Stock_D1Mini\"
  -D WLED_DISABLE_PARTICLESYSTEM2D
  -D WLED_DISABLE_PARTICLESYSTEM1D

; ============================================================
; ENV 2: D1 Mini — DENGAN USERMOD, SEMUA FITUR AKTIF
; Minimal disable: hanya particle system karena wajib untuk
; muat di 4MB. Semua fitur WLED lain tetap aktif.
; ============================================================
[env:custom_autoRearLight_d1Mini_full]
extends = env:nodemcuv2
board = d1_mini
board_build.ldscript = ${common.ldscript_4m1m}
custom_usermods = AutoRearLight
build_flags =
  ${common.build_flags}
  ${esp8266.build_flags}
  -D WLED_RELEASE_NAME=\"AutoRearLight_D1Mini_Full\"
  -D WLED_DISABLE_PARTICLESYSTEM2D
  -D WLED_DISABLE_PARTICLESYSTEM1D

; ============================================================
; ENV 3: D1 Mini — DENGAN USERMOD, FITUR DIKURANGI
; Untuk hardware yang RAM-nya sudah terlalu penuh.
; Ini env utama untuk testing dan produksi di D1 Mini.
; ============================================================
[env:custom_autoRearLight_d1Mini]
extends = env:nodemcuv2
board = d1_mini
board_build.ldscript = ${common.ldscript_4m1m}
custom_usermods = AutoRearLight
build_flags =
  ${common.build_flags}
  ${esp8266.build_flags}
  -D WLED_RELEASE_NAME=\"AutoRearLight_D1Mini\"
  ; Usermod flags
  ; -D AUTOREARL_DISABLE_FILE_PATTERNS
  ; -D AUTOREARL_DISABLE_CONFIG
  ; Wajib untuk muat di ESP8266 4MB
  -D WLED_DISABLE_PARTICLESYSTEM2D
  -D WLED_DISABLE_PARTICLESYSTEM1D
  ; Fitur yang tidak diperlukan untuk use-case motor
  -D WLED_DISABLE_ALEXA
  -D WLED_DISABLE_BLYNK
  -D WLED_DISABLE_CRONIXIE
  ; -D WLED_DISABLE_OTA
  -D WLED_DISABLE_HUESYNC
  -D WLED_DISABLE_ADALIGHT
  -D WLED_DISABLE_LOXONE
  -D WLED_DISABLE_MQTT
  -D WLED_DISABLE_INFRARED
  -D WLED_DISABLE_ESPNOW

; ============================================================
; ENV 4: ESP32 — DENGAN USERMOD, SEMUA FITUR AKTIF
; Minimal disable: hanya yang wajib untuk Classic ESP32.
; ============================================================
[env:custom_autoRearLight_esp32_full]
extends = env:esp32dev
custom_usermods = AutoRearLight
build_flags =
  ${common.build_flags}
  ${esp32_idf_V4.build_flags}
  -D WLED_RELEASE_NAME=\"AutoRearLight_ESP32_Full\"
  ; Wajib untuk Classic ESP32
  -D ARDUINO_USB_CDC_ON_BOOT=0
  ; Usermod flags
  ; -D AUTOREARL_DISABLE_FILE_PATTERNS
  ; -D AUTOREARL_DISABLE_CONFIG

; ============================================================
; ENV 5: ESP32 — DENGAN USERMOD, FITUR DIKURANGI
; Env produksi ESP32 untuk use-case motor.
; ============================================================
[env:custom_autoRearLight_esp32]
extends = env:esp32dev
custom_usermods = AutoRearLight
build_flags =
  ${common.build_flags}
  ${esp32_idf_V4.build_flags}
  -D WLED_RELEASE_NAME=\"AutoRearLight_ESP32\"
  ; Wajib untuk Classic ESP32
  -D ARDUINO_USB_CDC_ON_BOOT=0
  ; Usermod flags
  ; -D AUTOREARL_DISABLE_FILE_PATTERNS
  ; -D AUTOREARL_DISABLE_CONFIG
  ; Fitur yang tidak diperlukan untuk use-case motor
  -D WLED_DISABLE_ALEXA
  -D WLED_DISABLE_BLYNK
  -D WLED_DISABLE_CRONIXIE
  -D WLED_DISABLE_HUESYNC
  -D WLED_DISABLE_LOXONE
  -D WLED_DISABLE_INFRARED
  -D WLED_DISABLE_MQTT
