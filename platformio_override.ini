[platformio]
default_envs = custom_autoRearLight

[env:esp8266_4m1m]
extends = env:esp8266_2m
board = d1_mini
board_build.filesystem = littlefs
board_build.ldscript = eagle.flash.4m1m.ld

[env:custom_autoRearLight]
extends = env:esp8266_2m
board = d1_mini
board_build.filesystem = littlefs
board_build.ldscript = eagle.flash.4m1m.ld
custom_usermods = AutoRearLight
build_flags =
  ${common.build_flags}

  ; ===== AUTOREARL TESTING FLAGS =====
  ; Uncomment to disable all LittleFS pattern loading.
  ; Use this first to isolate whether file loading is causing the bootloop.
  ; When set, the usermod always uses built-in PROGMEM arrows.
  -D AUTOREARL_DISABLE_FILE_PATTERNS

  ; ===== ESP8266 SIZE REDUCTIONS =====
  ; We need to disable as many features as possible.
  ; WLED on ESP8266 already hits its memory limit!
  -D WLED_DISABLE_ALEXA
  -D WLED_DISABLE_BLYNK
  -D WLED_DISABLE_CRONIXIE
  -D WLED_DISABLE_OTA
  -D WLED_DISABLE_HUESYNC
  -D WLED_DISABLE_ADALIGHT
  -D WLED_DISABLE_LOXONE
  -D WLED_DISABLE_MQTT
  -D WLED_DISABLE_INFRARED
  -D WLED_DISABLE_PARTICLESYSTEM1D
  -D WLED_DISABLE_ESPNOW
